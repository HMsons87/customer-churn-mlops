version: '3.8'

services:
  # 1. خدمة الـ API (الخلفية)
  api:
    build: .
    container_name: churn_api
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  # 2. خدمة لوحة التحكم (الواجهة)
  dashboard:
    build: .
    container_name: churn_dashboard
    command: python -m streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api